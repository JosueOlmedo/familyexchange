<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎁 Family Gift Exchange</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="snowflakes" aria-hidden="true" id="snowflakes"></div>

  <!-- AUTH SCREEN -->
  <div class="register-overlay" id="authOverlay">
    <div class="register-box" id="authBox">
      <h1 id="authTitle">🎄</h1>
      <p class="event-name" id="authEvent"></p>
      <p class="subtitle" id="authSubtitle"></p>
      <div id="authContent"></div>
      <p id="authError" style="color:var(--red);margin-top:0.5rem;display:none;"></p>
    </div>
  </div>

  <!-- HEADER -->
  <header id="appHeader" class="hidden">
    <div class="header-top">
      <span class="header-title"><i class="fas fa-gift"></i> <span id="headerEvent"></span></span>
      <div class="header-controls">
        <div class="user-badge">
          <span id="userAvatar" style="font-size:1.5rem;"></span>
          <span id="userName"></span>
        </div>
      </div>
    </div>
    <nav>
      <button class="nav-btn active" data-section="mylist"><i class="fas fa-list"></i> <span id="navMyList"></span></button>
      <button class="nav-btn" data-section="result"><i class="fas fa-gift"></i> <span id="navMyMatch"></span></button>
    </nav>
  </header>

  <main id="appContent" class="hidden">
    <!-- WISHLIST -->
    <section id="mylist" class="section active">
      <div class="card">
        <h2><i class="fas fa-user"></i> <span id="memberName"></span></h2>
        <p style="color:var(--text-secondary);margin-bottom:1rem;">
          <i class="fas fa-home"></i> <span id="memberFamily"></span> &nbsp;|&nbsp;
          <i class="fas fa-envelope"></i> <span id="memberEmail"></span>
        </p>
        <div class="info-banner" id="budgetBanner" style="display:none;">
          <i class="fas fa-money-bill-wave"></i> <span id="budgetLabel"></span>: <span id="budgetAmount"></span>
        </div>
        <p style="margin:1rem 0;color:var(--text-secondary);" id="maxGiftsInfo"></p>
        <div id="wishlistItems"></div>
        <button class="btn btn-secondary" id="addWishItem" style="margin-bottom:1rem;">
          <i class="fas fa-plus"></i> <span id="addGiftText"></span>
        </button>
        <button class="btn btn-christmas" id="saveWishlist">
          <i class="fas fa-save"></i> <span id="saveListText"></span>
        </button>
        <div id="saveStatus" style="text-align:center;margin-top:1rem;"></div>
      </div>
    </section>

    <!-- MATCH RESULT -->
    <section id="result" class="section">
      <div class="card" id="noResultCard">
        <div style="text-align:center;padding:2rem;">
          <i class="fas fa-hourglass-half" style="font-size:3rem;color:var(--gold);"></i>
          <h2 style="margin-top:1rem;color:var(--gold);" id="noDrawTitle"></h2>
          <p style="color:var(--text-secondary);" id="noDrawDesc"></p>
        </div>
      </div>
      <div class="card hidden" id="resultCard">
        <h2><i class="fas fa-gift"></i> <span id="yourMatchTitle"></span></h2>
        <p id="sorteoDateInfo" style="color:var(--text-secondary);margin-bottom:1rem;"></p>
        <div style="background:linear-gradient(135deg,#27ae60,#1e8449);border-radius:12px;padding:20px;text-align:center;margin:1rem 0;">
          <div style="font-size:2.5rem;">🎁</div>
          <p style="color:rgba(255,255,255,0.8);font-size:0.9rem;margin:5px 0;" id="youGotText"></p>
          <h2 style="color:#fff;font-size:1.8rem;margin:5px 0;" id="matchName"></h2>
          <p style="color:rgba(255,255,255,0.7);font-size:0.85rem;" id="matchFamily"></p>
        </div>
        <div id="matchBudget" style="display:none;" class="info-banner">
          <i class="fas fa-money-bill-wave"></i> <span id="matchBudgetLabel"></span>: <span id="matchBudgetAmount"></span>
        </div>
        <h3 style="color:var(--red);margin:1.5rem 0 0.5rem;"><i class="fas fa-gifts"></i> <span id="theirWishlistTitle"></span></h3>
        <div id="matchWishlist"></div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script src="js/storage.js"></script>
  <script>
    // ==================== CONFIG ====================
    const AVATARS = ['🎅','🤶','🧑🎄','⛄','🦌','🎄','🐧','🎁','⭐','🔔','❄️','🍪'];
    const params = new URLSearchParams(window.location.search);
    let binId = params.get('bin');
    let memberId = params.get('id');
    let cloudData = null;
    let memberInfo = null;
    let maxGifts = 5;
    let wishlistItems = [];
    let selectedAvatar = null;

    // ==================== i18n ====================
    let lang = localStorage.getItem('intercambio_lang') || 'es';
    const T = {
      es: {
        already_registered: 'Ya me registré',
        register: 'Registrarme',
        login_title: '🔑 Iniciar sesión',
        login_subtitle: 'Selecciona tu nombre e ingresa tu contraseña',
        select_name: '-- Selecciona tu nombre --',
        password: 'Contraseña',
        enter: 'Entrar',
        back: '← Volver',
        register_title: '🎄 Registro',
        register_subtitle: '¡Únete a tu familia!',
        your_family: 'Tu familia:',
        select: '-- Selecciona --',
        your_name: 'Tu nombre:',
        name_placeholder: 'Tu nombre',
        your_email: 'Tu correo:',
        pick_avatar: 'Elige tu avatar:',
        create_password: 'Crea una contraseña:',
        register_btn: 'Registrarme',
        welcome_back: '¡Bienvenido de nuevo, {name}!',
        enter_password: 'Ingresa tu contraseña',
        hi_name: '¡Hola {name}! 🎄',
        setup_account: 'Configura tu cuenta',
        create_pw_placeholder: 'Crea una contraseña',
        my_list: 'Mi Lista',
        my_match: 'Mi Amigo',
        budget_label: 'Presupuesto',
        can_add: 'Puedes agregar hasta {n} regalos.',
        list_empty: '¡Tu lista está vacía! Agrega los regalos que te gustaría recibir 🎄',
        gift_n: '🎁 Regalo #{n}',
        gift_title: 'Nombre/Título:',
        gift_link: 'Enlace (URL):',
        gift_image: 'URL de imagen:',
        gift_desc: 'Descripción:',
        gift_notes: 'Notas:',
        add_gift: 'Agregar Regalo',
        save_list: 'Guardar Mi Lista',
        saving: 'Guardando...',
        saved: '¡Lista guardada! ✅',
        save_error: 'Error al guardar.',
        saved_ok: 'Guardado',
        saved_fail: 'Error',
        no_draw: 'Sorteo no realizado',
        no_draw_desc: 'El admin aún no ha hecho el sorteo. ¡Vuelve más tarde!',
        your_match: '¡Tu Amigo Secreto!',
        you_got: 'Te tocó:',
        draw_date: 'Sorteo',
        their_wishlist: 'Su lista de deseos:',
        no_wishlist: 'Aún no tiene lista.',
        view_link: 'Ver enlace',
        max_gifts: 'Máximo {n} regalos',
        err_invalid: 'Enlace inválido.',
        err_no_data: 'No se pudieron cargar los datos.',
        err_not_found: 'Miembro no encontrado.',
        err_select_name: 'Selecciona tu nombre',
        err_enter_pw: 'Ingresa tu contraseña',
        err_wrong_pw: 'Contraseña incorrecta',
        err_no_members: 'No hay miembros registrados. ¡Regístrate primero!',
        err_no_families: 'No hay familias creadas. Contacta al admin.',
        err_select_family: 'Selecciona tu familia',
        err_enter_name: 'Ingresa tu nombre',
        err_create_pw: 'Crea una contraseña',
        err_dup_name: '"{name}" ya existe en esta familia',
        err_family_not_found: 'Familia no encontrada',
        contact_organizer: 'Contacta al organizador.',
      },
      en: {
        already_registered: 'I already registered',
        register: 'Register',
        login_title: '🔑 Login',
        login_subtitle: 'Select your name and enter your password',
        select_name: '-- Select your name --',
        password: 'Password',
        enter: 'Enter',
        back: '← Back',
        register_title: '🎄 Register',
        register_subtitle: 'Join your family!',
        your_family: 'Your family:',
        select: '-- Select --',
        your_name: 'Your name:',
        name_placeholder: 'Your name',
        your_email: 'Your email:',
        pick_avatar: 'Pick your avatar:',
        create_password: 'Create a password:',
        register_btn: 'Register',
        welcome_back: 'Welcome back, {name}!',
        enter_password: 'Enter your password',
        hi_name: 'Hi {name}! 🎄',
        setup_account: 'Set up your account',
        create_pw_placeholder: 'Create a password',
        my_list: 'My List',
        my_match: 'My Match',
        budget_label: 'Budget',
        can_add: 'You can add up to {n} gifts.',
        list_empty: 'Your list is empty! Add gifts you\'d like to receive 🎄',
        gift_n: '🎁 Gift #{n}',
        gift_title: 'Name/Title:',
        gift_link: 'Link (URL):',
        gift_image: 'Image URL:',
        gift_desc: 'Description:',
        gift_notes: 'Notes:',
        add_gift: 'Add Gift',
        save_list: 'Save My List',
        saving: 'Saving...',
        saved: 'List saved! ✅',
        save_error: 'Error saving.',
        saved_ok: 'Saved',
        saved_fail: 'Error',
        no_draw: 'Draw not done yet',
        no_draw_desc: 'The admin hasn\'t done the draw yet. Check back later!',
        your_match: 'Your Match!',
        you_got: 'You got:',
        draw_date: 'Draw',
        their_wishlist: 'Their Wishlist:',
        no_wishlist: 'No wishlist yet.',
        view_link: 'View link',
        max_gifts: 'Max {n} gifts',
        err_invalid: 'Invalid link.',
        err_no_data: 'Could not load data.',
        err_not_found: 'Member not found.',
        err_select_name: 'Select your name',
        err_enter_pw: 'Enter your password',
        err_wrong_pw: 'Wrong password',
        err_no_members: 'No registered members yet. Register first!',
        err_no_families: 'No families created yet. Ask the admin.',
        err_select_family: 'Select your family',
        err_enter_name: 'Enter your name',
        err_create_pw: 'Create a password',
        err_dup_name: '"{name}" already exists in this family',
        err_family_not_found: 'Family not found',
        contact_organizer: 'Contact the organizer.',
      }
    };
    function t(key) { return T[lang]?.[key] || T['en'][key] || key; }
    function toggleLang() {
      lang = lang === 'es' ? 'en' : 'es';
      localStorage.setItem('intercambio_lang', lang);
      updateLangBtn();
    }
    function updateLangBtn() {
      document.querySelectorAll('.lang-toggle').forEach(b => b.textContent = lang === 'es' ? 'ES / EN' : 'EN / ES');
    }

    // ==================== INIT ====================
    document.addEventListener('DOMContentLoaded', async () => {
      createSnowflakes();
      initTheme();

      if (!binId) { showError(t('err_invalid')); return; }

      CloudStorage.init(binId);
      cloudData = await CloudStorage.load();
      if (!cloudData || !cloudData.families) { showError(t('err_no_data')); return; }

      document.getElementById('authEvent').textContent = cloudData.config?.eventName || 'Gift Exchange';
      maxGifts = cloudData.config?.maxGifts || 5;

      if (memberId) {
        // Direct link with ID — find member
        memberInfo = findMember(memberId);
        if (!memberInfo) { showError(t('err_not_found')); return; }
        wishlistItems = cloudData.wishlists?.[memberId] || [];
        showAuthForMember();
      } else {
        // Base link — show login/register choice
        showLanding();
      }
    });

    function findMember(id) {
      for (const f of cloudData.families) {
        const m = f.members.find(m => m.id === id);
        if (m) return { ...m, familyId: f.id, familyName: f.name };
      }
      return null;
    }

    function getAllRegisteredMembers() {
      return cloudData.families.flatMap(f =>
        f.members.filter(m => m.name && m.name.trim()).map(m => ({ ...m, familyId: f.id, familyName: f.name }))
      );
    }

    // ==================== LANDING (base link) ====================
    function showLanding() {
      document.getElementById('authTitle').textContent = '🎄 ' + (cloudData.config?.eventName || 'Gift Exchange');
      document.getElementById('authSubtitle').textContent = '';

      const members = getAllRegisteredMembers();

      document.getElementById('authContent').innerHTML = `
        <div style="display:flex;gap:0.5rem;margin-top:1.5rem;flex-wrap:wrap;justify-content:center;">
          <button class="btn btn-primary" id="btnLogin" style="flex:1;min-width:140px;">
            <i class="fas fa-sign-in-alt"></i> ${t('already_registered')}
          </button>
          <button class="btn btn-christmas" id="btnRegister" style="flex:1;min-width:140px;margin:0;">
            <i class="fas fa-user-plus"></i> ${t('register')}
          </button>
        </div>
        <div style="margin-top:1.5rem;">
          <button class="lang-toggle" onclick="toggleLang();showLanding();" style="background:var(--bg-card-alt);color:var(--text-primary);border:2px solid var(--border-color);">${lang === 'es' ? 'ES / EN' : 'EN / ES'}</button>
        </div>
      `;

      document.getElementById('btnLogin').addEventListener('click', showLoginForm);
      document.getElementById('btnRegister').addEventListener('click', showRegisterForm);
    }

    // ==================== LOGIN FORM ====================
    function showLoginForm() {
      const members = getAllRegisteredMembers().filter(m => m.password);
      if (!members.length) { showAuthError(t('err_no_members')); return; }

      document.getElementById('authTitle').textContent = t('login_title');
      document.getElementById('authSubtitle').textContent = t('login_subtitle');

      document.getElementById('authContent').innerHTML = `
        <div class="form-group">
          <select id="loginSelect" style="width:100%;padding:0.7rem;border-radius:10px;border:2px solid var(--input-border);background:var(--input-bg);color:var(--text-primary);font-family:'Nunito',sans-serif;">
            <option value="">${t('select_name')}</option>
            ${cloudData.families.map(f => {
              const opts = f.members.filter(m => m.password).map(m =>
                `<option value="${m.id}">${esc(m.name)} (${esc(f.name)})</option>`
              ).join('');
              return opts ? `<optgroup label="${esc(f.name)}">${opts}</optgroup>` : '';
            }).join('')}
          </select>
        </div>
        <div class="form-group">
          <input type="password" id="loginPassword" placeholder="${t('password')}" style="text-align:center;">
        </div>
        <button class="btn btn-christmas" id="loginEnter" style="margin-top:0.5rem;">${t('enter')}</button>
        <p style="margin-top:1rem;"><a href="#" id="backToLanding" style="color:var(--green);font-size:0.85rem;">${t('back')}</a></p>
      `;

      document.getElementById('loginEnter').addEventListener('click', handleLogin);
      document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
      document.getElementById('backToLanding').addEventListener('click', (e) => { e.preventDefault(); showLanding(); });
    }

    function handleLogin() {
      const id = document.getElementById('loginSelect').value;
      const pw = document.getElementById('loginPassword').value;
      if (!id) { showAuthError(t('err_select_name')); return; }
      if (!pw) { showAuthError(t('err_enter_pw')); return; }

      const info = findMember(id);
      if (!info || info.password !== pw) { showAuthError(t('err_wrong_pw')); return; }

      memberId = id;
      memberInfo = info;
      wishlistItems = cloudData.wishlists?.[memberId] || [];
      showDashboard();
    }

    // ==================== REGISTER FORM ====================
    function showRegisterForm() {
      const families = cloudData.families.filter(f => f.name);
      if (!families.length) { showAuthError(t('err_no_families')); return; }

      document.getElementById('authTitle').textContent = t('register_title');
      document.getElementById('authSubtitle').textContent = t('register_subtitle');

      document.getElementById('authContent').innerHTML = `
        <div class="form-group">
          <label style="font-weight:600;">${t('your_family')}</label>
          <select id="regFamily" style="width:100%;padding:0.7rem;border-radius:10px;border:2px solid var(--input-border);background:var(--input-bg);color:var(--text-primary);font-family:'Nunito',sans-serif;">
            <option value="">${t('select')}</option>
            ${families.map(f => `<option value="${f.id}">${esc(f.name)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label style="font-weight:600;">${t('your_name')}</label>
          <input type="text" id="regName" placeholder="${t('name_placeholder')}" maxlength="30">
        </div>
        <div class="form-group">
          <label style="font-weight:600;">${t('your_email')}</label>
          <input type="email" id="regEmail" placeholder="your@email.com">
        </div>
        <p style="font-weight:600;margin:0.5rem 0;">${t('pick_avatar')}</p>
        <div class="avatar-picker" id="avatarPicker"></div>
        <div class="form-group" style="margin-top:0.5rem;">
          <label style="font-weight:600;">${t('create_password')}</label>
          <input type="password" id="regPassword" placeholder="${t('password')}" style="text-align:center;">
        </div>
        <button class="btn btn-christmas" id="regEnter" style="margin-top:0.5rem;">${t('register_btn')}</button>
        <p style="margin-top:1rem;"><a href="#" id="backToLanding2" style="color:var(--green);font-size:0.85rem;">${t('back')}</a></p>
      `;

      buildAvatarPicker();
      document.getElementById('regEnter').addEventListener('click', handleRegister);
      document.getElementById('regPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
      document.getElementById('backToLanding2').addEventListener('click', (e) => { e.preventDefault(); showLanding(); });
    }

    function handleRegister() {
      const familyId = document.getElementById('regFamily').value;
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const pw = document.getElementById('regPassword').value;

      if (!familyId) { showAuthError(t('err_select_family')); return; }
      if (!name) { showAuthError(t('err_enter_name')); return; }
      if (!pw) { showAuthError(t('err_create_pw')); return; }

      const family = cloudData.families.find(f => f.id === familyId);
      if (!family) { showAuthError(t('err_family_not_found')); return; }
      const dup = family.members.find(m => m.name.trim().toLowerCase() === name.toLowerCase());
      if (dup) { showAuthError(t('err_dup_name').replace('{name}', name)); return; }

      // Create member
      const newId = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
      const newMember = {
        id: newId,
        name: name,
        email: email,
        password: pw,
        avatar: selectedAvatar || '🎅'
      };
      family.members.push(newMember);
      CloudStorage.save(cloudData);

      memberId = newId;
      memberInfo = { ...newMember, familyId: family.id, familyName: family.name };
      wishlistItems = [];
      if (!cloudData.wishlists) cloudData.wishlists = {};

      showDashboard();
    }

    // ==================== AUTH FOR DIRECT LINK (with ?id=) ====================
    function showAuthForMember() {
      if (memberInfo.password) {
        document.getElementById('authTitle').textContent = t('welcome_back').replace('{name}', memberInfo.name);
        document.getElementById('authSubtitle').textContent = t('enter_password');
        document.getElementById('authContent').innerHTML = `
          <div class="form-group">
            <input type="password" id="directPassword" placeholder="${t('password')}" style="text-align:center;">
          </div>
          <button class="btn btn-christmas" id="directEnter" style="margin-top:0.5rem;">${t('enter')}</button>
        `;
        document.getElementById('directEnter').addEventListener('click', () => {
          const pw = document.getElementById('directPassword').value;
          if (pw === memberInfo.password) showDashboard();
          else showAuthError(t('err_wrong_pw'));
        });
        document.getElementById('directPassword').addEventListener('keydown', e => {
          if (e.key === 'Enter') document.getElementById('directEnter').click();
        });
      } else {
        // First time via direct link — set password + avatar
        document.getElementById('authTitle').textContent = t('hi_name').replace('{name}', memberInfo.name);
        document.getElementById('authSubtitle').textContent = t('setup_account');
        document.getElementById('authContent').innerHTML = `
          <p style="font-weight:600;margin-bottom:0.5rem;">${t('pick_avatar')}</p>
          <div class="avatar-picker" id="avatarPicker"></div>
          <div class="form-group" style="margin-top:0.5rem;">
            <input type="password" id="directPassword" placeholder="${t('create_pw_placeholder')}" style="text-align:center;">
          </div>
          <button class="btn btn-christmas" id="directEnter" style="margin-top:0.5rem;">${t('register_btn')}</button>
        `;
        buildAvatarPicker();
        document.getElementById('directEnter').addEventListener('click', () => {
          const pw = document.getElementById('directPassword').value;
          if (!pw) { showAuthError(t('err_create_pw')); return; }
          // Save to cloud
          for (const f of cloudData.families) {
            const m = f.members.find(m => m.id === memberId);
            if (m) { m.password = pw; m.avatar = selectedAvatar || '🎅'; break; }
          }
          memberInfo.password = pw;
          memberInfo.avatar = selectedAvatar || '🎅';
          CloudStorage.save(cloudData);
          showDashboard();
        });
        document.getElementById('directPassword').addEventListener('keydown', e => {
          if (e.key === 'Enter') document.getElementById('directEnter').click();
        });
      }
    }

    // ==================== DASHBOARD ====================
    function showDashboard() {
      document.getElementById('authOverlay').classList.add('hidden');
      document.getElementById('appHeader').classList.remove('hidden');
      document.getElementById('appContent').classList.remove('hidden');

      document.getElementById('headerEvent').textContent = cloudData.config?.eventName || '';
      document.getElementById('userName').textContent = memberInfo.name;
      document.getElementById('userAvatar').textContent = memberInfo.avatar || '🎅';
      document.getElementById('memberName').textContent = memberInfo.name;
      document.getElementById('memberFamily').textContent = memberInfo.familyName;
      document.getElementById('memberEmail').textContent = memberInfo.email || 'N/A';
      document.getElementById('maxGiftsInfo').textContent = t('can_add').replace('{n}', maxGifts);

      // Translate static elements
      document.getElementById('navMyList').textContent = t('my_list');
      document.getElementById('navMyMatch').textContent = t('my_match');
      document.getElementById('addGiftText').textContent = t('add_gift');
      document.getElementById('saveListText').textContent = t('save_list');
      document.getElementById('budgetLabel').textContent = t('budget_label');
      document.getElementById('noDrawTitle').textContent = t('no_draw');
      document.getElementById('noDrawDesc').textContent = t('no_draw_desc');
      document.getElementById('yourMatchTitle').textContent = t('your_match');
      document.getElementById('youGotText').textContent = t('you_got');
      document.getElementById('matchBudgetLabel').textContent = t('budget_label');
      document.getElementById('theirWishlistTitle').textContent = t('their_wishlist');

      if (cloudData.config?.budget) {
        document.getElementById('budgetBanner').style.display = 'block';
        document.getElementById('budgetAmount').textContent = cloudData.config.budget;
      }

      renderWishlist();
      renderResult();
      initNav();

      document.getElementById('addWishItem').addEventListener('click', addItem);
      document.getElementById('saveWishlist').addEventListener('click', saveList);
    }

    // ==================== NAV ====================
    function initNav() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(btn.dataset.section).classList.add('active');
        });
      });
    }

    // ==================== WISHLIST ====================
    function renderWishlist() {
      const container = document.getElementById('wishlistItems');
      document.getElementById('addWishItem').classList.toggle('hidden', wishlistItems.length >= maxGifts);

      if (!wishlistItems.length) {
        container.innerHTML = `<p style="color:var(--text-secondary);text-align:center;padding:2rem;">${t('list_empty')}</p>`;
        return;
      }
      container.innerHTML = wishlistItems.map((item, i) => `
        <div class="wish-item">
          <h4><span>${t('gift_n').replace('{n}', i + 1)}</span>
            <button class="btn btn-danger" onclick="removeItem(${i})"><i class="fas fa-trash"></i></button>
          </h4>
          <div class="form-group"><label>${t('gift_title')}</label>
            <input type="text" value="${esc(item.title)}" oninput="updateItem(${i},'title',this.value)"></div>
          <div class="form-group"><label>${t('gift_link')}</label>
            <input type="url" value="${esc(item.link)}" oninput="updateItem(${i},'link',this.value)" placeholder="https://..."></div>
          <div class="form-group"><label>${t('gift_image')}</label>
            <input type="url" value="${esc(item.imageUrl)}" oninput="updateItem(${i},'imageUrl',this.value); this.nextElementSibling.src=this.value;" placeholder="https://...">
            <img class="preview-img" src="${esc(item.imageUrl)}" onerror="this.style.display='none'" onload="this.style.display='block'" style="${item.imageUrl ? '' : 'display:none'}"></div>
          <div class="form-group"><label>${t('gift_desc')}</label>
            <textarea oninput="updateItem(${i},'description',this.value)">${esc(item.description)}</textarea></div>
          <div class="form-group"><label>${t('gift_notes')}</label>
            <textarea oninput="updateItem(${i},'notes',this.value)">${esc(item.notes)}</textarea></div>
        </div>
      `).join('');
    }

    function addItem() {
      if (wishlistItems.length >= maxGifts) { toast(t('max_gifts').replace('{n}', maxGifts), 'error'); return; }
      wishlistItems.push({ title: '', link: '', imageUrl: '', description: '', notes: '' });
      renderWishlist();
    }
    function updateItem(i, field, val) { if (wishlistItems[i]) wishlistItems[i][field] = val; }
    function removeItem(i) { wishlistItems.splice(i, 1); renderWishlist(); }

    async function saveList() {
      const btn = document.getElementById('saveWishlist');
      const status = document.getElementById('saveStatus');
      btn.disabled = true;
      btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${t('saving')}`;

      if (!cloudData.wishlists) cloudData.wishlists = {};
      cloudData.wishlists[memberId] = wishlistItems;
      const ok = await CloudStorage.save(cloudData);

      btn.disabled = false;
      btn.innerHTML = `<i class="fas fa-save"></i> ${t('save_list')}`;
      if (ok) {
        toast(t('saved'), 'success');
        status.innerHTML = `<span style="color:var(--green);"><i class="fas fa-check-circle"></i> ${t('saved_ok')}</span>`;
      } else {
        toast(t('save_error'), 'error');
        status.innerHTML = `<span style="color:var(--red);"><i class="fas fa-times-circle"></i> ${t('saved_fail')}</span>`;
      }
    }

    // ==================== RESULT ====================
    function renderResult() {
      if (!cloudData.sorteoResult) return;
      const match = cloudData.sorteoResult.find(r => r.giverId === memberId);
      if (!match) return;

      let receiver = null;
      for (const f of cloudData.families) {
        const m = f.members.find(m => m.id === match.receiverId);
        if (m) { receiver = { ...m, familyName: f.name }; break; }
      }
      if (!receiver) return;

      document.getElementById('noResultCard').classList.add('hidden');
      document.getElementById('resultCard').classList.remove('hidden');
      document.getElementById('matchName').textContent = receiver.name;
      document.getElementById('matchFamily').textContent = receiver.familyName;

      if (cloudData.sorteoDate) {
        const d = new Date(cloudData.sorteoDate);
        document.getElementById('sorteoDateInfo').innerHTML =
          `<i class="fas fa-calendar"></i> ${t('draw_date')}: ${d.toLocaleDateString()} - ${d.toLocaleTimeString()}`;
      }
      if (cloudData.config?.budget) {
        document.getElementById('matchBudget').style.display = 'block';
        document.getElementById('matchBudgetAmount').textContent = cloudData.config.budget;
      }

      const items = (cloudData.wishlists?.[receiver.id] || []).filter(w => w.title.trim());
      const container = document.getElementById('matchWishlist');
      if (!items.length) {
        container.innerHTML = `<p style="color:var(--text-secondary);">${t('no_wishlist')}</p>`;
        return;
      }
      container.innerHTML = items.map(w => `
        <div class="wish-item" style="border-color:var(--green);">
          <h4 style="color:var(--green);">🎁 ${esc(w.title)}</h4>
          ${w.description ? `<p style="color:var(--text-secondary);">${esc(w.description)}</p>` : ''}
          ${w.link ? `<p><a href="${esc(w.link)}" target="_blank" style="color:var(--green);"><i class="fas fa-external-link-alt"></i> ${t('view_link')}</a></p>` : ''}
          ${w.imageUrl ? `<img class="preview-img" src="${esc(w.imageUrl)}" style="display:block;" onerror="this.style.display='none'">` : ''}
          ${w.notes ? `<p style="color:var(--text-secondary);font-style:italic;font-size:0.85rem;">📝 ${esc(w.notes)}</p>` : ''}
        </div>
      `).join('');
    }

    // ==================== AVATAR PICKER ====================
    function buildAvatarPicker() {
      const c = document.getElementById('avatarPicker');
      if (!c) return;
      c.innerHTML = '';
      AVATARS.forEach(emoji => {
        const div = document.createElement('div');
        div.className = 'avatar-option';
        div.style.cssText = 'display:flex;align-items:center;justify-content:center;font-size:2rem;';
        div.textContent = emoji;
        div.addEventListener('click', () => {
          c.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
          div.classList.add('selected');
          selectedAvatar = emoji;
        });
        c.appendChild(div);
      });
      c.children[0]?.click();
    }

    // ==================== UTILS ====================
    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function toast(msg, type = 'info') {
      const el = document.getElementById('toast');
      el.textContent = msg; el.className = `toast ${type}`;
      setTimeout(() => el.classList.add('hidden'), 3500);
    }
    function showError(msg) {
      document.getElementById('authBox').innerHTML = `
        <div style="text-align:center;">
          <i class="fas fa-exclamation-triangle" style="font-size:3rem;color:var(--red);"></i>
          <h2 style="margin-top:1rem;">${msg}</h2>
          <p style="color:var(--text-secondary);">${t('contact_organizer')}</p>
        </div>`;
    }
    function showAuthError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg; el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }
    function initTheme() {
      const saved = localStorage.getItem('intercambio_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
    }
    function createSnowflakes() {
      const c = document.getElementById('snowflakes');
      for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'snowflake';
        el.textContent = ['❄','❅','❆','✦'][Math.floor(Math.random()*4)];
        el.style.left = Math.random()*100+'%';
        el.style.fontSize = (Math.random()*1.2+0.5)+'rem';
        el.style.animationDuration = (Math.random()*5+5)+'s';
        el.style.animationDelay = (Math.random()*8)+'s';
        el.style.opacity = Math.random()*0.6+0.2;
        c.appendChild(el);
      }
    }
  </script>
</body>
</html>
